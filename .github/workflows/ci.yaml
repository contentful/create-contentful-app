name: CI

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [main, canary]
  pull_request:
    branches: [main, canary]

env:
  NPM_CONFIG_PROGRESS: 'false'
  NPM_CONFIG_LOGLEVEL: warn

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yml
  test-app:
    uses: ./.github/workflows/test-app.yml
  test-functions:
    uses: ./.github/workflows/test-functions.yml
